; ============================================================
; HAB Payload Stabilization System — Arm Assembly Firmware
; Target: Adafruit Feather STM32F405 Express
; Framework: Arduino via STM32duino
; ============================================================

[env:adafruit_feather_f405]
platform  = ststm32
board     = adafruit_feather_f405
framework = arduino

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC   ; USB serial
    -D USBCON
    -D USBD_VID=0x239A
    -D USBD_PID=0x0057
    -D HAL_PCD_MODULE_ENABLED
    -D SIMPLEFOC_STM32_DEBUG              ; SimpleFOC debug output

lib_deps =
    askuric/Simple FOC @ ^2.3.4
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.14.5

; Upload via DFU bootloader
upload_protocol = dfu

; ── Native unit tests ────────────────────────────────────────
; Run with: pio test -e native
; No hardware needed — tests heading math on your PC.
[env:native]
platform = native
test_framework = unity
; Point to stubs so heading_control.h can compile without Arduino/SimpleFOC
build_flags = -I test/stubs -I src
; Don't compile src/ — tests include heading_control.h directly
test_build_src = no
