; ============================================================
; HAB Payload Stabilization System — Arm Assembly Firmware
; Target: Adafruit Feather STM32F405 Express
; Framework: Arduino via STM32duino
; ============================================================

[env:adafruit_feather_f405]
platform  = ststm32
board     = adafruit_feather_f405
framework = arduino
; monitor_port left unset -> PlatformIO auto-detects the Feather's
; CDC port (was COM8, a Windows-only name). Override per-OS if needed.
; Build the real firmware (main.cpp) but NOT the bench test sketches
build_src_filter = +<*> -<motor_test.cpp> -<pwm_test.cpp> -<encoder_test.cpp> -<foc_test.cpp>

; Serial monitor
monitor_speed   = 115200
monitor_filters = default

; Build flags
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC   ; USB serial
    -D USBCON
    -D USBD_VID=0x239A
    -D USBD_PID=0x0057
    -D HAL_PCD_MODULE_ENABLED
    -D SIMPLEFOC_STM32_DEBUG              ; SimpleFOC debug output

lib_deps =
    askuric/Simple FOC @ ^2.3.4
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.14.5

; Upload via DFU bootloader
upload_protocol = dfu

; ── Motor bring-up test (open-loop, no encoder/IMU/PID) ──────
; Minimal sketch to prove the driver + phase wiring can rotate
; the motor. Builds src/motor_test.cpp INSTEAD of src/main.cpp.
;   Build + upload:  pio run -e motortest -t upload
;   Monitor:         pio device monitor -e motortest
[env:motortest]
extends = env:adafruit_feather_f405
; Compile everything in src/ EXCEPT main.cpp + the other test sketches
build_src_filter = +<*> -<main.cpp> -<pwm_test.cpp> -<encoder_test.cpp> -<foc_test.cpp>

; ── Bare-metal PWM test (analogWrite, NO SimpleFOC) ──────────
; Proves the MCU can PWM the driver pins / spin the motor with
; zero SimpleFOC. Builds src/pwm_test.cpp only.
;   Build + upload:  pio run -e pwmtest -t upload
[env:pwmtest]
extends = env:adafruit_feather_f405
build_src_filter = +<*> -<main.cpp> -<motor_test.cpp> -<encoder_test.cpp> -<foc_test.cpp>

; ── Encoder readout test (AS5048A, motor OFF) ────────────────
; Verifies the magnetic encoder reads a sane angle before FOC.
;   Build + upload:  pio run -e enctest -t upload
[env:enctest]
extends = env:adafruit_feather_f405
build_src_filter = +<*> -<main.cpp> -<motor_test.cpp> -<pwm_test.cpp> -<foc_test.cpp>

; ── Closed-loop FOC test (motor + encoder, torque mode) ──────
; Validates initFOC alignment + FOC commutation before the full
; stabilization firmware.  Build + upload:  pio run -e foctest -t upload
[env:foctest]
extends = env:adafruit_feather_f405
build_src_filter = +<*> -<main.cpp> -<motor_test.cpp> -<pwm_test.cpp> -<encoder_test.cpp>

; ── Native unit tests ────────────────────────────────────────
; Run with: pio test -e native
; No hardware needed — tests heading math on your PC.
[env:native]
platform = native
test_framework = unity
; Point to stubs so heading_control.h can compile without Arduino/SimpleFOC
build_flags = -I test/stubs -I src
; Don't compile src/ — tests include heading_control.h directly
test_build_src = no
